<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Preload local fonts  -->
    <link
      rel="preload"
      href="/fonts/Michroma/Michroma-Regular.ttf"
      as="font"
      type="font/ttf"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/Orbitron/static/Orbitron-Regular.ttf"
      as="font"
      type="font/ttf"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/aeogo-pxltd-next-font/AeogoPxltdNext-5y27B.ttf"
      as="font"
      type="font/ttf"
      crossorigin
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=Rajdhani:wght@300;400;500;600;700&family=Space+Grotesk:wght@300..700&family=Space+Mono:wght@400;700&family=Syne:wght@400..800&display=swap"
      rel="stylesheet"
    />
    <title>SKELETIN - HOME</title>
    <script>
      // Prevent flash of wrong theme — runs before any paint
      (function () {
        var theme = localStorage.getItem("skeletin-theme") || "dark";
        if (theme === "dark") document.documentElement.classList.add("dark");
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
